openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Flike Agency API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Order management
  - name: auth
    description: Authentication
  - name: analytics
    description: Analytics and reporting
  - name: portfolio
    description: Portfolio items
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Dashboard summary — total orders, revenue, leads by status
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Monthly revenue and order counts
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  /analytics/leads:
    get:
      operationId: getLeadAnalytics
      tags: [analytics]
      summary: Lead breakdown by website type
      responses:
        "200":
          description: Lead analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadDataPoint"

  /portfolio:
    get:
      operationId: listPortfolio
      tags: [portfolio]
      summary: List portfolio items
      responses:
        "200":
          description: Portfolio items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Order:
      type: object
      required: [id, orderId, name, email, phone, company, country, websiteType, projectName, projectDescription, selectedFeatures, estimatedPrice, status, createdAt]
      properties:
        id:
          type: integer
        orderId:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        country:
          type: string
        websiteType:
          type: string
        projectName:
          type: string
        projectDescription:
          type: string
        selectedFeatures:
          type: array
          items:
            type: string
        estimatedPrice:
          type: number
        status:
          type: string
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [name, email, phone, company, country, websiteType, projectName, projectDescription, selectedFeatures, estimatedPrice]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        country:
          type: string
        websiteType:
          type: string
        projectName:
          type: string
        projectDescription:
          type: string
        selectedFeatures:
          type: array
          items:
            type: string
        estimatedPrice:
          type: number

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string

    OrderListResponse:
      type: object
      required: [orders, total, page, limit]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AdminUser:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/AdminUser"
        token:
          type: string

    AnalyticsSummary:
      type: object
      required: [totalOrders, totalRevenue, newLeads, inProgress, completed]
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        newLeads:
          type: integer
        inProgress:
          type: integer
        completed:
          type: integer
        cancelled:
          type: integer

    RevenueDataPoint:
      type: object
      required: [month, revenue, orders]
      properties:
        month:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    LeadDataPoint:
      type: object
      required: [type, count]
      properties:
        type:
          type: string
        count:
          type: integer

    PortfolioItem:
      type: object
      required: [id, title, description, image, technologies, demoUrl, category]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        image:
          type: string
        technologies:
          type: array
          items:
            type: string
        demoUrl:
          type: string
        category:
          type: string
