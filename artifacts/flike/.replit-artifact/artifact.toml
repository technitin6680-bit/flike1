kind = "web"
previewPath = "/"
title = "Flike Agency"
version = "1.0.0"
id = "artifacts/flike"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25612

[services.development]
run = "pnpm --filter @workspace/flike run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flike", "run", "build" ]
publicDir = "artifacts/flike/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25612"
BASE_PATH = "/"
